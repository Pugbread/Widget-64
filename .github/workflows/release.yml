name: Release

# Builds and publishes Widget 64 installers for macOS (universal), Linux (x86_64), and Windows (x86_64).
# Triggers on a v-prefixed tag push or manual dispatch.
#
# App binaries remain OS-code-signing unsigned until Apple/Azure signing is configured.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to build (e.g. v20 or v0.1.0). Blank resolves to v<git commit count>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-tag:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and app version
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            count="$(git rev-list --count HEAD)"
            tag="v${count}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "Release tag must look like v20, v1.2, or v1.2.3; got: $tag" >&2
            exit 1
          fi

          raw="${tag#v}"
          IFS='.' read -r major minor patch extra <<< "$raw"
          if [[ -n "${extra:-}" ]]; then
            echo "Release tag has too many version components: $tag" >&2
            exit 1
          elif [[ -z "${minor:-}" ]]; then
            version="0.0.${major}"
          elif [[ -z "${patch:-}" ]]; then
            version="${major}.${minor}.0"
          else
            version="${major}.${minor}.${patch}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag ${tag} with app version ${version}"

  build:
    name: Build (${{ matrix.platform.name }})
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-universal
            os: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - name: linux-x86_64
            os: ubuntu-22.04
            args: ""
            rust-targets: ""
          - name: windows-x86_64
            os: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-targets }}

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          const files = ["package.json", "package-lock.json", "src-tauri/tauri.conf.json"];
          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            if (file === "package-lock.json" && json.packages?.[""]) {
              json.packages[""].version = version;
            }
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          NODE

      - name: Install npm dependencies
        run: npm ci

      - name: Verify updater public key
        shell: bash
        run: |
          if grep -q "REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY" src-tauri/tauri.conf.json; then
            echo "Replace the updater pubkey in src-tauri/tauri.conf.json before publishing updater releases."
            exit 1
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # TODO: signing — macOS (Apple notarytool + codesign)
          #   https://tauri.app/v2/distribute/sign/macos/
          #   https://developer.apple.com/documentation/security/notarizing_macos_software_before_distribution
          # Secrets to add once we have an Apple Developer account:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          #
          # TODO: signing — Windows (Azure Trusted Signing)
          #   https://tauri.app/v2/distribute/sign/windows/
          #   https://learn.microsoft.com/en-us/azure/trusted-signing/
          # Secrets to add once an Azure Trusted Signing account exists:
          #   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
          #   AZURE_TRUSTED_SIGNING_ENDPOINT, AZURE_CODE_SIGNING_ACCOUNT,
          #   AZURE_CERTIFICATE_PROFILE
          #
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: "Widget 64 ${{ needs.resolve-tag.outputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}

      - name: Collect bundle artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # macOS
          find src-tauri/target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          # Linux
          find src-tauri/target/release/bundle/deb -maxdepth 1 -name "*.deb" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/appimage -maxdepth 1 \( -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" -o -name "*.AppImage.sig" \) -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/rpm -maxdepth 1 -name "*.rpm" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          # Windows
          find src-tauri/target/release/bundle/nsis -maxdepth 1 -name "*.exe" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/nsis -maxdepth 1 -name "*.exe.sig" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/msi -maxdepth 1 -name "*.msi" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/release/bundle/msi -maxdepth 1 -name "*.msi.sig" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target -name "latest.json" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          ls -la dist-artifacts || true

      - name: Upload bundle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget64-${{ matrix.platform.name }}
          path: dist-artifacts/*
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: "Widget 64 ${{ needs.resolve-tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
