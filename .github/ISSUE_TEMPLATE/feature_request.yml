name: Feature request
description: Suggest an idea or improvement for Widget 64.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem first, then your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What is currently painful, slow, or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like. Mock-ups, API sketches, or flows welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, prior art in other terminals/editors, screenshots.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions for this idea.
          required: true
